name: Refresh Heavy-Ion Feed

on:
  schedule:
    # Every 5 minutes for testing (Europe/Berlin timezone: UTC+1 CET / UTC+2 CEST)
    - cron: "*/5 * * * *"
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate 7-day feed
        run: |
          python create_arxiv_feed.py --search \
            -c Heavy-Ion \
            --lookback_days 7 \
            --base_feed_url https://lucasconstantin.github.io/heavyIon_newsfeed/feeds

      - name: Generate 100-day feed
        run: |
          python create_arxiv_feed.py --search \
            -c Heavy-Ion \
            --lookback_days 100 \
            --base_feed_url https://lucasconstantin.github.io/heavyIon_newsfeed/feeds

      - name: Deploy feeds to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./feeds
          destination_dir: feeds
          commit_message: "chore: refresh feeds [skip ci]"
